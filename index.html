<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Login to Account</h1>
        </div>
        
        <form action="">
            <label for="">Email or Username</label>
            <input type="text">
            <label for="">Password</label>
            <input type="password">
            <a href="#">I forgot my password</a>
            <input type="submit" value="login">



        </form>
       <div class="footer">
        <h3> Login with another account</h3>


        <div class="images">

            <img src="1.png" alt="linkedin">
            <img src="2.png" alt="google">
            <img src="3.png" alt="facebook">
            <img src="4.png" alt="github">
            <img src="5.jpg" alt="twitter">
        </div>
        <a>Don't have an account ? Sign up for free.</a>
       </div>
            
            
    </div>
    
</body>
</html>
